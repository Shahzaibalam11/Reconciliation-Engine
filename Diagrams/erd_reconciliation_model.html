<style>
#erd svg.erDiagram .divider path { stroke-opacity: 0.5; }
#erd svg.erDiagram .row-rect-odd path,
#erd svg.erDiagram .row-rect-odd rect,
#erd svg.erDiagram .row-rect-even path,
#erd svg.erDiagram .row-rect-even rect { stroke: none !important; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});

const src = `erDiagram
  SLV_PARTNER_EVENTS ||--o{ FACT_RECONCILIATION_BREAK : "may produce break"
  SLV_INTERNAL_EVENTS ||--o{ FACT_RECONCILIATION_BREAK : "may produce break"
  SLV_PARTNER_EVENTS ||--o| SLV_INTERNAL_EVENTS : "matched via partner_txn_id or composite key"
  USER_CHURN_EVENTS }o--|| SLV_INTERNAL_EVENTS : "flags orphan churn"
  FACT_RECONCILIATION_BREAK }o--|| RECONCILIATION_DAILY : "aggregated into"
  DIM_OPERATOR ||--o{ SLV_PARTNER_EVENTS : "describes"
  DIM_OPERATOR ||--o{ SLV_INTERNAL_EVENTS : "describes"
  DIM_OPERATOR ||--o{ RECONCILIATION_DAILY : "describes"

  SLV_PARTNER_EVENTS {
    string operator_code PK
    string partner_txn_id PK
    date business_date PK
    string partner_account_id
    string txn_type
    decimal amount
    string currency
    timestamp txn_ts_utc
    date ingestion_date
    string source_file
  }

  SLV_INTERNAL_EVENTS {
    string operator_code PK
    string internal_id PK
    string user_id FK
    string partner_txn_id FK "nullable"
    string txn_type
    string status
    decimal amount
    timestamp txn_ts_utc
    date business_date
    date ingestion_date
    string source_table
  }

  USER_CHURN_EVENTS {
    string user_id PK
    string operator_code PK
    timestamp churn_ts_utc PK
    string churn_reason
    string last_known_sub_id
  }

  FACT_RECONCILIATION_BREAK {
    string operator_code PK
    string break_id PK
    string partner_txn_id FK
    string internal_id FK
    string break_category
    date business_date
    date ingestion_date
    decimal partner_amount
    decimal internal_amount
    decimal variance
    string match_method
    boolean is_late_arrival
  }

  RECONCILIATION_DAILY {
    date business_date PK
    string operator_code PK
    int partner_txn_count
    int internal_txn_count
    int matched_count
    int break_count
    decimal partner_amount_total
    decimal internal_amount_total
    decimal variance
    int break_amount_mismatch_count
    int break_missing_on_platform_count
    int break_missing_at_partner_count
    int break_orphan_churn_count
    int late_arrival_count
  }

  DIM_OPERATOR {
    string operator_code PK
    string operator_name
    string operator_type
    string default_currency
    string default_timezone
    decimal amount_tolerance
    int fallback_match_window_minutes
  }`;

const { svg } = await mermaid.render('erd-svg', src);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
