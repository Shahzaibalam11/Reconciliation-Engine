<svg viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg" role="img" style="width:100%;height:auto;">
  <title>Medallion architecture as implemented on Fabric</title>
  <desc>RAW holds the source files. Silver notebooks land a Delta mirror into ODS as a bootstrap step, then normalize into one canonical Silver table per side. Gold reads Silver, matches, classifies breaks, and writes the daily mart plus the row-level fact table. Finance and Product consume Gold.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .t  { font: 14px "Anthropic Sans", -apple-system, "Segoe UI", sans-serif; fill: #3D3D3A; }
      .ts { font: 12px "Anthropic Sans", -apple-system, "Segoe UI", sans-serif; fill: #5F5E5A; }
      .th { font: 500 14px "Anthropic Sans", -apple-system, "Segoe UI", sans-serif; fill: #444441; }
      .arr { fill: none; stroke: #5F5E5A; stroke-width: 1; }
      .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
      .c-gray .th { fill: #444441; }
      .c-gray .ts { fill: #5F5E5A; }
      .c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
      .c-blue .th { fill: #0C447C; }
      .c-blue .ts { fill: #185FA5; }
      .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
      .c-teal .th { fill: #085041; }
      .c-teal .ts { fill: #0F6E56; }
      .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
      .c-purple .th { fill: #3C3489; }
      .c-purple .ts { fill: #534AB7; }
      .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
      .c-amber .th { fill: #633806; }
      .c-amber .ts { fill: #854F0B; }
    </style>
  </defs>

  <text class="ts" x="80" y="32" text-anchor="middle">Sources</text>
  <text class="ts" x="220" y="32" text-anchor="middle">RAW</text>
  <text class="ts" x="360" y="32" text-anchor="middle">ODS</text>
  <text class="ts" x="500" y="32" text-anchor="middle">SILVER</text>
  <text class="ts" x="620" y="32" text-anchor="middle">GOLD</text>

  <g class="c-gray">
    <rect x="30" y="50" width="100" height="56" rx="6" stroke-width="0.5"/>
    <text class="th" x="80" y="72" text-anchor="middle" dominant-baseline="central">Operator SFTP</text>
    <text class="ts" x="80" y="90" text-anchor="middle" dominant-baseline="central">6–7 telcos</text>
  </g>
  <g class="c-gray">
    <rect x="30" y="124" width="100" height="56" rx="6" stroke-width="0.5"/>
    <text class="th" x="80" y="146" text-anchor="middle" dominant-baseline="central">Internal OLTP</text>
    <text class="ts" x="80" y="164" text-anchor="middle" dominant-baseline="central">CDC stream</text>
  </g>

  <line x1="130" y1="78" x2="166" y2="100" class="arr" marker-end="url(#arrow)"/>
  <line x1="130" y1="152" x2="166" y2="140" class="arr" marker-end="url(#arrow)"/>

  <g class="c-blue">
    <rect x="170" y="50" width="100" height="136" rx="8" stroke-width="0.5"/>
    <text class="th" x="220" y="80" text-anchor="middle" dominant-baseline="central">Immutable</text>
    <text class="th" x="220" y="98" text-anchor="middle" dominant-baseline="central">file landing</text>
    <text class="ts" x="220" y="124" text-anchor="middle" dominant-baseline="central">append-only</text>
    <text class="ts" x="220" y="142" text-anchor="middle" dominant-baseline="central">partitioned by</text>
    <text class="ts" x="220" y="160" text-anchor="middle" dominant-baseline="central">ingestion_date</text>
  </g>

  <line x1="270" y1="90" x2="306" y2="110" class="arr" marker-end="url(#arrow)"/>
  <line x1="270" y1="146" x2="306" y2="160" class="arr" marker-end="url(#arrow)"/>

  <g class="c-blue">
    <rect x="310" y="80" width="100" height="56" rx="6" stroke-width="0.5"/>
    <text class="th" x="360" y="100" text-anchor="middle" dominant-baseline="central">ods_partner</text>
    <text class="ts" x="360" y="118" text-anchor="middle" dominant-baseline="central">delta mirror</text>
  </g>
  <g class="c-blue">
    <rect x="310" y="148" width="100" height="56" rx="6" stroke-width="0.5"/>
    <text class="th" x="360" y="168" text-anchor="middle" dominant-baseline="central">ods_internal</text>
    <text class="ts" x="360" y="186" text-anchor="middle" dominant-baseline="central">sub_initial_*</text>
  </g>

  <text class="ts" x="360" y="225" text-anchor="middle" fill="#534AB7">bootstrap inside silver notebook</text>
  <text class="ts" x="360" y="240" text-anchor="middle" fill="#534AB7">(production: separated CDC stream)</text>

  <line x1="410" y1="108" x2="446" y2="112" class="arr" marker-end="url(#arrow)"/>
  <line x1="410" y1="176" x2="446" y2="172" class="arr" marker-end="url(#arrow)"/>

  <g class="c-teal">
    <rect x="450" y="80" width="100" height="56" rx="6" stroke-width="0.5"/>
    <text class="th" x="500" y="100" text-anchor="middle" dominant-baseline="central">slv_partner_evt</text>
    <text class="ts" x="500" y="118" text-anchor="middle" dominant-baseline="central">MERGE on PK</text>
  </g>
  <g class="c-teal">
    <rect x="450" y="148" width="100" height="56" rx="6" stroke-width="0.5"/>
    <text class="th" x="500" y="168" text-anchor="middle" dominant-baseline="central">slv_internal_evt</text>
    <text class="ts" x="500" y="186" text-anchor="middle" dominant-baseline="central">unionByName</text>
  </g>

  <line x1="550" y1="108" x2="568" y2="140" class="arr" marker-end="url(#arrow)"/>
  <line x1="550" y1="176" x2="568" y2="160" class="arr" marker-end="url(#arrow)"/>

  <g class="c-purple">
    <rect x="572" y="124" width="98" height="56" rx="6" stroke-width="0.5"/>
    <text class="th" x="621" y="144" text-anchor="middle" dominant-baseline="central">matching</text>
    <text class="th" x="621" y="160" text-anchor="middle" dominant-baseline="central">engine</text>
    <text class="ts" x="621" y="174" text-anchor="middle" dominant-baseline="central">7 rules</text>
  </g>

  <line x1="621" y1="184" x2="621" y2="210" class="arr" marker-end="url(#arrow)"/>

  <g class="c-purple">
    <rect x="572" y="216" width="98" height="48" rx="6" stroke-width="0.5"/>
    <text class="th" x="621" y="234" text-anchor="middle" dominant-baseline="central">fact_break</text>
    <text class="ts" x="621" y="252" text-anchor="middle" dominant-baseline="central">row level</text>
  </g>

  <line x1="621" y1="266" x2="621" y2="288" class="arr" marker-end="url(#arrow)"/>

  <g class="c-purple">
    <rect x="572" y="294" width="98" height="48" rx="6" stroke-width="0.5"/>
    <text class="th" x="621" y="312" text-anchor="middle" dominant-baseline="central">recon_daily</text>
    <text class="ts" x="621" y="330" text-anchor="middle" dominant-baseline="central">mart</text>
  </g>

  <line x1="572" y1="318" x2="500" y2="380" class="arr" marker-end="url(#arrow)" stroke-dasharray="2 3"/>
  <line x1="572" y1="318" x2="350" y2="380" class="arr" marker-end="url(#arrow)" stroke-dasharray="2 3"/>

  <g class="c-amber">
    <rect x="430" y="382" width="170" height="56" rx="6" stroke-width="0.5"/>
    <text class="th" x="515" y="402" text-anchor="middle" dominant-baseline="central">Finance</text>
    <text class="ts" x="515" y="420" text-anchor="middle" dominant-baseline="central">monthly close</text>
  </g>
  <g class="c-amber">
    <rect x="240" y="382" width="170" height="56" rx="6" stroke-width="0.5"/>
    <text class="th" x="325" y="402" text-anchor="middle" dominant-baseline="central">Product</text>
    <text class="ts" x="325" y="420" text-anchor="middle" dominant-baseline="central">silent churn</text>
  </g>

  <g class="c-gray">
    <rect x="30" y="466" width="640" height="98" rx="8" stroke-width="0.5" stroke-dasharray="3 3" fill="none"/>
    <text class="th" x="50" y="488" dominant-baseline="central">Cross-cutting concerns</text>
    <text class="ts" x="50" y="510" dominant-baseline="central">bitemporal: every row carries business_date and ingestion_date — frozen close and replay both queryable</text>
    <text class="ts" x="50" y="528" dominant-baseline="central">discovery: new operator drops a normalizer + ODS table; SILVER builds find both automatically</text>
    <text class="ts" x="50" y="546" dominant-baseline="central">idempotency: RAW immutable, SILVER merges on natural key, GOLD rebuilt from SILVER — any step re-runnable</text>
  </g>
</svg>
