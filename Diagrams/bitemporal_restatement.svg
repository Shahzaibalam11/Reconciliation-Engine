<svg viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg" role="img" style="width:100%;height:auto;">
  <title>Bitemporal restatement when a late-arriving transaction lands</title>
  <desc>A-0998 happens on May 18 but the partner only delivers it on May 20. The reconciliation_daily row for May 18 has two versions — one as Finance saw it at close, one after restatement. Both are queryable from the same table by filtering on ingestion_date.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .t  { font: 14px "Anthropic Sans", -apple-system, "Segoe UI", sans-serif; fill: #3D3D3A; }
      .ts { font: 12px "Anthropic Sans", -apple-system, "Segoe UI", sans-serif; fill: #5F5E5A; }
      .th { font: 500 14px "Anthropic Sans", -apple-system, "Segoe UI", sans-serif; fill: #444441; }
      .mono { font-family: ui-monospace, "Cascadia Code", "Fira Code", monospace; }
    </style>
  </defs>

  <text class="th" x="340" y="32" text-anchor="middle">A-0998 happened on May 18 but the partner only delivered it on May 20</text>
  <text class="ts" x="340" y="52" text-anchor="middle">Same business_date row in reconciliation_daily has two versions — both queryable</text>

  <line x1="40" y1="100" x2="640" y2="100" stroke="#B4B2A9" stroke-width="0.5"/>
  <text class="ts" x="120" y="92" text-anchor="middle">May 18</text>
  <text class="ts" x="260" y="92" text-anchor="middle">May 19</text>
  <text class="ts" x="400" y="92" text-anchor="middle">May 20</text>
  <text class="ts" x="540" y="92" text-anchor="middle">monthly close</text>
  <circle cx="120" cy="100" r="3" fill="#5F5E5A"/>
  <circle cx="260" cy="100" r="3" fill="#5F5E5A"/>
  <circle cx="400" cy="100" r="3" fill="#5F5E5A"/>
  <circle cx="540" cy="100" r="3" fill="#5F5E5A"/>

  <line x1="120" y1="104" x2="120" y2="124" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="ts" x="120" y="138" text-anchor="middle">txn occurs</text>

  <line x1="260" y1="104" x2="260" y2="124" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="ts" x="260" y="138" text-anchor="middle">May 18 closes</text>
  <text class="ts" x="260" y="152" text-anchor="middle">(Finance publishes)</text>

  <line x1="400" y1="104" x2="400" y2="124" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="ts" x="400" y="138" text-anchor="middle">partner finally</text>
  <text class="ts" x="400" y="152" text-anchor="middle">delivers A-0998</text>

  <rect x="40" y="190" width="285" height="180" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="th" x="56" y="214">View at close — what Finance published</text>
  <text class="ts" x="56" y="232">filter: ingestion_date ≤ '2026-05-19'</text>

  <rect x="56" y="250" width="253" height="106" rx="4" fill="#FFFFFF" stroke="#D3D1C7" stroke-width="0.5"/>
  <text class="ts mono" x="68" y="270">business_date  2026-05-18</text>
  <text class="ts mono" x="68" y="288">operator       telco_a</text>
  <text class="ts mono" x="68" y="306">partner_count  0</text>
  <text class="ts mono" x="68" y="324">partner_total  0.00</text>
  <text class="ts mono" x="68" y="342">variance       0.00</text>

  <rect x="355" y="190" width="285" height="180" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="371" y="214" fill="#3C3489">View today — restated with late arrival</text>
  <text class="ts" x="371" y="232" fill="#534AB7">no ingestion_date filter (all data)</text>

  <rect x="371" y="250" width="253" height="106" rx="4" fill="#FFFFFF" stroke="#7F77DD" stroke-width="0.5"/>
  <text class="ts mono" x="383" y="270">business_date  2026-05-18</text>
  <text class="ts mono" x="383" y="288">operator       telco_a</text>
  <text class="ts mono" x="383" y="306" fill="#3C3489">partner_count  1</text>
  <text class="ts mono" x="383" y="324" fill="#3C3489">partner_total  500.00</text>
  <text class="ts mono" x="383" y="342">variance       0.00</text>

  <line x1="325" y1="280" x2="355" y2="280" stroke="#7F77DD" stroke-width="0.5" stroke-dasharray="2 3"/>

  <rect x="40" y="400" width="600" height="115" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="56" y="425" fill="#0C447C">How the same table answers both questions</text>
  <text class="ts" x="56" y="447">Every row in reconciliation_daily carries (business_date, ingestion_date).</text>
  <text class="ts" x="56" y="465">May 18's late-arrival row is inserted with business_date=2026-05-18, ingestion_date=2026-05-20.</text>
  <text class="ts" x="56" y="483">Closed-as-of query filters ingestion_date ≤ close_date → frozen view, audit-friendly.</text>
  <text class="ts" x="56" y="501">Restated query omits the filter → today's complete view, including everything that arrived late.</text>
</svg>
